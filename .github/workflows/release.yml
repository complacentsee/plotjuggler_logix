name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  PJ_VERSION: '3.16.0'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
            artifact_name: libDataStreamLogixTrend.so
            artifact_path: build/libDataStreamLogixTrend.so
          - os: macos-14
            platform: macos-arm64
            artifact_name: libDataStreamLogixTrend.dylib
            artifact_path: build/libDataStreamLogixTrend.dylib
          - os: macos-14
            platform: macos-x64
            artifact_name: libDataStreamLogixTrend.dylib
            artifact_path: build/libDataStreamLogixTrend.dylib
          - os: windows-latest
            platform: windows-x64
            artifact_name: DataStreamLogixTrend.dll
            artifact_path: build/Release/DataStreamLogixTrend.dll

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Checkout PlotJuggler
        uses: actions/checkout@v6
        with:
          repository: facontidavide/PlotJuggler
          ref: ${{ env.PJ_VERSION }}
          path: PlotJuggler

      # ── Qt setup ──────────────────────────────────────────────────────

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev libqt5svg5-dev libqt5websockets5-dev \
            libqt5serialport5-dev libqt5opengl5-dev libqt5x11extras5-dev

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: tecolicom/actions-use-homebrew-tools@v1
        with:
          tools: qt@5
          cache: yes

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
          cache: 'true'

      # ── Build PlotJuggler (minimal) ───────────────────────────────────

      - name: Build PlotJuggler (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release"
          if [ "$RUNNER_OS" = "macOS" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)"
          fi
          cmake -S PlotJuggler -B PlotJuggler/build $CMAKE_ARGS
          cmake --build PlotJuggler/build --target plotjuggler_base plotjuggler_qwt fmt

      - name: Build PlotJuggler (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S PlotJuggler -B PlotJuggler/build
          cmake --build PlotJuggler/build --config Release --target plotjuggler_base plotjuggler_qwt fmt

      # ── Build plugin ──────────────────────────────────────────────────

      - name: Build plugin (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release -DPLOTJUGGLER_SRC_DIR=${{ github.workspace }}/PlotJuggler"
          if [ "$RUNNER_OS" = "macOS" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)"
          fi
          cmake -S . -B build $CMAKE_ARGS
          cmake --build build

      - name: Build plugin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DPLOTJUGGLER_SRC_DIR="${{ github.workspace }}/PlotJuggler"
          cmake --build build --config Release

      # ── Upload ────────────────────────────────────────────────────────

      - name: Rename artifact
        shell: bash
        run: |
          DEST="DataStreamLogixTrend-${{ github.ref_name }}-${{ matrix.platform }}$(echo "${{ matrix.artifact_name }}" | sed 's/.*\./\./')"
          cp "${{ matrix.artifact_path }}" "$DEST"
          echo "RELEASE_FILE=$DEST" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DataStreamLogixTrend-${{ matrix.platform }}
          path: ${{ env.RELEASE_FILE }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_FILE }}
          generate_release_notes: true
          fail_on_unmatched_files: false
